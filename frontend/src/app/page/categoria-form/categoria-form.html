<div class="container mt-5" style="max-width: 700px;">
  <div class="card shadow p-4">
    <h2 class="mb-4 text-center">Cadastrar Nova Categoria</h2>

    <div *ngIf="mensagemSucesso" class="alert alert-success text-center">{{ mensagemSucesso }}</div>
    <div *ngIf="erroServidor" class="alert alert-danger text-center">{{ erroServidor }}</div>

    <form [formGroup]="categoriaForm" (ngSubmit)="submeter()">

      <div class="mb-3">
        <label class="form-label font-weight-bold">Nome da Categoria</label>
        <input type="text" formControlName="nome" class="form-control" [ngClass]="{'is-invalid': categoriaForm.get('nome')?.touched && categoriaForm.get('nome')?.invalid}">
        <div class="invalid-feedback" *ngIf="categoriaForm.get('nome')?.hasError('required')">O nome é obrigatório.</div>
        <div class="invalid-feedback" *ngIf="categoriaForm.get('nome')?.hasError('nomeDuplicado')">Este nome já foi cadastrado.</div>
      </div>

      <div class="mb-4">
        <label class="form-label">Descrição</label>
        <textarea formControlName="descricao" rows="4" class="form-control" placeholder="Descreva aqui..." [ngClass]="{'is-invalid': categoriaForm.get('descricao')?.touched && categoriaForm.get('descricao')?.invalid}"></textarea>
        <div class="invalid-feedback" *ngIf="categoriaForm.get('descricao')?.hasError('required')">A descrição é obrigatória.</div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-light" [routerLink]="['/']">Cancelar</button>
        <button type="submit" class="btn btn-success" [disabled]="categoriaForm.invalid">Salvar Categoria</button>
      </div>

    </form>
  </div>
</div>
