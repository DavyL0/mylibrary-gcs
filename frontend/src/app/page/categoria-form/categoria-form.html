<div class="container mt-4" style="max-width: 640px;">
  <div class="card shadow-sm">
    <h2 class="mb-4 text-center" style="font-size: 1.25rem; font-weight: 600;">Cadastrar Nova Categoria</h2>

    <div *ngIf="mensagemSucesso" class="badge success mb-3 w-100" style="padding: 10px; font-size: 13px;">{{ mensagemSucesso }}</div>
    <div *ngIf="erroServidor" class="badge danger mb-3 w-100" style="padding: 10px; font-size: 13px;">{{ erroServidor }}</div>

    <form [formGroup]="categoriaForm" (ngSubmit)="submeter()">

      <div class="form-group">
        <label class="form-label">Nome da Categoria</label>
        <input type="text" formControlName="nome" class="form-control" [ngClass]="{'is-invalid': categoriaForm.get('nome')?.touched && categoriaForm.get('nome')?.invalid}" placeholder="Ex: Ficção Científica">
        <div class="invalid-feedback" *ngIf="categoriaForm.get('nome')?.hasError('required')">O nome é obrigatório.</div>
        <div class="invalid-feedback" *ngIf="categoriaForm.get('nome')?.hasError('nomeDuplicado')">Este nome já foi cadastrado.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea formControlName="descricao" rows="4" class="form-control" placeholder="Descreva a categoria..." [ngClass]="{'is-invalid': categoriaForm.get('descricao')?.touched && categoriaForm.get('descricao')?.invalid}"></textarea>
        <div class="invalid-feedback" *ngIf="categoriaForm.get('descricao')?.hasError('required')">A descrição é obrigatória.</div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-ghost" (click)="navegarParaDashboard()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="categoriaForm.invalid">Salvar Categoria</button>
      </div>

    </form>
  </div>
</div>
