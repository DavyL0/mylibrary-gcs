<div class="container mt-4" style="max-width: 640px;">
  <div class="card shadow-sm">
    <h2 class="mb-4 text-center" style="font-size: 1.25rem; font-weight: 600;">Cadastrar Novo Livro</h2>

    <div *ngIf="mensagemSucesso" class="badge success mb-3 w-100" style="padding: 10px; font-size: 13px;">{{ mensagemSucesso }}</div>
    <div *ngIf="erroServidor" class="badge danger mb-3 w-100" style="padding: 10px; font-size: 13px;">{{ erroServidor }}</div>

    <form [formGroup]="livroForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label class="form-label">Título do Livro</label>
        <input type="text" formControlName="titulo" class="form-control" [ngClass]="{'is-invalid': livroForm.get('titulo')?.touched && livroForm.get('titulo')?.invalid}" placeholder="Ex: O Senhor dos Anéis">
        <div class="invalid-feedback" *ngIf="livroForm.get('titulo')?.hasError('required')">O título é obrigatório.</div>
      </div>

      <div class="row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Autor</label>
          <input type="text" formControlName="autor" class="form-control" [ngClass]="{'is-invalid': livroForm.get('autor')?.touched && livroForm.get('autor')?.invalid}" placeholder="Ex: J.R.R. Tolkien">
          <div class="invalid-feedback" *ngIf="livroForm.get('autor')?.hasError('required')">O autor é obrigatório.</div>
        </div>
        <div class="form-group" style="flex: 1;">
          <label class="form-label">ISBN</label>
          <input type="text" formControlName="isbn" class="form-control" [ngClass]="{'is-invalid': livroForm.get('isbn')?.touched && livroForm.get('isbn')?.invalid}" placeholder="Ex: 978-0261103252">
          <div class="invalid-feedback" *ngIf="livroForm.get('isbn')?.hasError('required')">O ISBN é obrigatório.</div>
        </div>
      </div>

      <div class="row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Ano de Lançamento</label>
          <input type="number" formControlName="anoPublicacao" class="form-control" [ngClass]="{'is-invalid': livroForm.get('anoPublicacao')?.touched && livroForm.get('anoPublicacao')?.invalid}">
        </div>
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Categoria</label>
          <select formControlName="categoria" class="form-control" [ngClass]="{'is-invalid': livroForm.get('categoria')?.touched && livroForm.get('categoria')?.invalid}">
            <option value="" disabled selected>Selecione uma categoria</option>
            <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nome }}</option>
          </select>
          <div class="invalid-feedback" *ngIf="livroForm.get('categoria')?.hasError('required')">A categoria é obrigatória.</div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-ghost" (click)="navegarParaLivros()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="livroForm.invalid">Salvar Livro</button>
      </div>

    </form>
  </div>
</div>
