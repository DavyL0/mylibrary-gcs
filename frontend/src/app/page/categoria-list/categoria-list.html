<div class="categoria-list" *ngIf="categorias && categorias.length > 0; else emptyState">
  <div class="section-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="section-title mb-0">Todas as Categorias</h2>
      <span class="badge info">{{ categorias.length }} {{ categorias.length === 1 ? 'CATEGORIA' : 'CATEGORIAS' }}</span>
    </div>

    <div class="categoria-grid">
      <div class="categoria-item" *ngFor="let cat of categorias">
        <div class="cat-info">
          <span class="cat-nome">{{ cat.nome }}</span>
          <p class="cat-desc">{{ cat.descricao }}</p>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #emptyState>
  <div class="empty-state">
    <i class="ti ti-category-2" aria-hidden="true"></i>
    <p>Nenhuma categoria cadastrada até o momento.</p>
  </div>
</ng-template>
